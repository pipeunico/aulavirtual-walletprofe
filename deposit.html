<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallet - Depositar</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
</head>
<body>

    <div class="container mt-5">
        <h2>Depositar Dinero</h2>
        <hr>

        <div id="alertMensaje" class="alert" hidden></div>

        <form id="depositForm">
            <div class="form-group">
                <label>Monto a depositar:</label>
                <input type="number" class="form-control" id="inputDeposito" min="1" required>
            </div>
            <button type="submit" class="btn btn-success">Realizar depósito</button>
        </form>
        
        <br>
        <a href="menu.html" class="btn btn-link">Volver al Menú</a>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        $(document).ready(function() {
            var saldoActual = Number(localStorage.getItem('walletSaldo')) || 0;

            $('#depositForm').submit(function(evento) {
                evento.preventDefault();
                var monto = Number($('#inputDeposito').val());

                saldoActual = saldoActual + monto;
                localStorage.setItem('walletSaldo', saldoActual);
                
                $('#alertMensaje').removeClass('alert-danger').addClass('alert-success')
                                  .text('¡Depósito exitoso! Nuevo saldo: $' + saldoActual)
                                  .removeAttr('hidden'); 
                
                $('#inputDeposito').val('');
            });
        });
    </script>
</body>
</html>
